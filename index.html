<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STATIC // SECURE COMMS</title>
    <style>
        :root {
            --bg-color: #1a1b1e; --panel-color: #25262b; --accent-color: #e67e22; 
            --text-main: #c1c2c5; --text-dim: #5c5f66; --border-style: 1px solid #373a40;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', monospace;
            background-color: var(--bg-color); color: var(--text-main); overflow: hidden;
        }

        /* --- ЭКРАН АВТОРИЗАЦИИ --- */
        #auth-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            background: radial-gradient(circle, #25262b 0%, #1a1b1e 100%);
        }
        
        .auth-box {
            background: var(--panel-color); padding: 30px; border-radius: 8px; border: var(--border-style);
            width: 300px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .auth-box h1 { color: var(--accent-color); letter-spacing: 2px; margin-bottom: 20px; }
        .auth-box input {
            width: 90%; padding: 10px; margin-bottom: 15px; background: #1a1b1e; border: var(--border-style);
            color: #fff; border-radius: 4px; outline: none;
        }
        .auth-box button {
            width: 100%; padding: 10px; background: var(--accent-color); color: #000; font-weight: bold;
            border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px;
        }
        .auth-switch { font-size: 0.8rem; color: var(--text-dim); cursor: pointer; }
        .auth-switch:hover { color: #fff; }

        /* --- ГЛАВНОЕ ПРИЛОЖЕНИЕ --- */
        #app-screen { display: none; height: 100vh; width: 100vw; }
        
        .sidebar { width: 320px; background: var(--panel-color); border-right: var(--border-style); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: var(--border-style); display: flex; justify-content: space-between; align-items: center;}
        .sidebar-header h1 { margin: 0; font-size: 1.2rem; color: var(--accent-color); }
        
        .search-bar { padding: 10px; border-bottom: var(--border-style); }
        .search-bar input { width: 90%; padding: 8px; background: #1a1b1e; border: var(--border-style); color: #fff; border-radius: 4px;}

        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #2c2e33; cursor: pointer; display: flex; gap: 12px; }
        .chat-item:hover, .chat-item.active { background: #2c2e33; }
        .chat-item.active { border-left: 4px solid var(--accent-color); }
        .chat-avatar { width: 40px; height: 40px; background: #373a40; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent-color); }
        .chat-meta h2 { margin: 0; font-size: 0.95rem; color: #fff; }
        .chat-meta p { margin: 3px 0 0; font-size: 0.8rem; color: var(--text-dim); }

        .chat-window { flex: 1; display: flex; flex-direction: column; background: #141517; }
        .chat-header { padding: 15px 20px; background: var(--panel-color); border-bottom: var(--border-style); display: flex; justify-content: space-between;}
        .chat-header h2 { margin: 0; font-size: 1.1rem; }
        .logout-btn { background: #e03131; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 0.8rem;}

        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 14px; font-size: 0.95rem; border-radius: 4px; }
        .msg.in { align-self: flex-start; background: #25262b; border-left: 2px solid var(--text-dim); }
        .msg.out { align-self: flex-end; background: #2c2e33; border-right: 2px solid var(--accent-color); text-align: right; }

        .input-bar { padding: 15px; background: var(--panel-color); display: flex; gap: 10px; border-top: var(--border-style); }
        .input-bar input { flex: 1; background: #1a1b1e; border: var(--border-style); padding: 12px; color: #fff; outline: none; }
        .input-bar button { background: var(--accent-color); border: none; padding: 0 20px; font-weight: bold; cursor: pointer; border-radius: 4px;}
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box" id="login-box">
        <h1>STATIC // LOGIN</h1>
        <input type="text" id="login-name" placeholder="Имя пользователя">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button onclick="login()">ВОЙТИ</button>
        <div class="auth-switch" onclick="toggleAuth()">Нет аккаунта? Зарегистрироваться</div>
    </div>

    <div class="auth-box" id="register-box" style="display: none;">
        <h1>STATIC // REGISTER</h1>
        <input type="text" id="reg-name" placeholder="Придумайте имя">
        <input type="password" id="reg-pass" placeholder="Придумайте пароль">
        <button onclick="register()">РЕГИСТРАЦИЯ</button>
        <div class="auth-switch" onclick="toggleAuth()">Уже есть аккаунт? Войти</div>
    </div>
</div>

<div id="app-screen">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1 id="my-username">STATIC</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Поиск пользователя..." oninput="searchUser()">
        </div>
        <div class="chats-list" id="chats-list"></div>
    </aside>

    <main class="chat-window">
        <header class="chat-header">
            <h2 id="current-chat-name">Выберите чат</h2>
            <button class="logout-btn" onclick="logout()">ВЫЙТИ</button>
        </header>

        <div class="messages-area" id="messages"></div>

        <div class="input-bar">
            <input type="text" id="main-input" placeholder="Передача данных...">
            <button onclick="send()">SEND</button>
        </div>
    </main>
</div>

<script>
    // --- ЛОКАЛЬНАЯ БАЗА (Для симуляции работы сети) ---
    // В реальном проекте тут будет запрос к серверу
    if (!localStorage.getItem('staticUsers')) {
        localStorage.setItem('staticUsers', JSON.stringify({
            "Ярослав": { password: "123", role: "User" },
            "Egor": { password: "admin", role: "Admin" }
        }));
    }

    let currentUser = null;

    // --- АВТОРИЗАЦИЯ И РЕГИСТРАЦИЯ ---
    function toggleAuth() {
        const loginBox = document.getElementById('login-box');
        const regBox = document.getElementById('register-box');
        if (loginBox.style.display === 'none') {
            loginBox.style.display = 'block'; regBox.style.display = 'none';
        } else {
            loginBox.style.display = 'none'; regBox.style.display = 'block';
        }
    }

    function register() {
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        let db = JSON.parse(localStorage.getItem('staticUsers'));

        if (!name || !pass) return alert("Заполните все поля!");
        if (db[name]) return alert("Имя уже занято!");

        db[name] = { password: pass, role: "User" };
        localStorage.setItem('staticUsers', JSON.stringify(db));
        alert("Успешно! Теперь войдите.");
        toggleAuth();
    }

    function login() {
        const name = document.getElementById('login-name').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        let db = JSON.parse(localStorage.getItem('staticUsers'));

        if (db[name] && db[name].password === pass) {
            // Сохраняем сессию!
            localStorage.setItem('staticSession', name);
            initApp(name);
        } else {
            alert("Неверное имя или пароль.");
        }
    }

    function logout() {
        localStorage.removeItem('staticSession'); // Удаляем сессию
        document.getElementById('app-screen').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('login-name').value = '';
        document.getElementById('login-pass').value = '';
    }

    // --- ЗАПУСК ПРИЛОЖЕНИЯ ---
    // Проверяем, авторизован ли пользователь был раньше
    window.onload = () => {
        const savedSession = localStorage.getItem('staticSession');
        if (savedSession) {
            initApp(savedSession);
        }
    };

    function initApp(username) {
        currentUser = username;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        document.getElementById('my-username').innerText = "NODE: " + username.toUpperCase();
        renderChats();
    }

    // --- ПОИСК И ОТОБРАЖЕНИЕ ПОЛЬЗОВАТЕЛЕЙ ---
    function renderChats(filter = "") {
        const list = document.getElementById('chats-list');
        const db = JSON.parse(localStorage.getItem('staticUsers'));
        list.innerHTML = '';

        for (let user in db) {
            if (user === currentUser) continue; // Себя не показываем
            if (filter && !user.toLowerCase().includes(filter.toLowerCase())) continue;

            const div = document.createElement('div');
            div.className = 'chat-item';
            div.onclick = () => openChat(user);
            div.innerHTML = `
                <div class="chat-avatar">${user[0].toUpperCase()}</div>
                <div class="chat-meta">
                    <h2>${user}</h2>
                    <p>Нажмите для связи</p>
                </div>
            `;
            list.appendChild(div);
        }
    }

    function searchUser() {
        const text = document.getElementById('search-input').value;
        renderChats(text);
    }

    // --- ЧАТ (Визуальная заглушка) ---
    let currentChat = "";
    function openChat(user) {
        currentChat = user;
        document.getElementById('current-chat-name').innerText = "Терминал: " + user;
        document.getElementById('messages').innerHTML = `
            <div style="text-align:center; color: #5c5f66; font-size: 0.8rem;">
                SECURE CONNECTION ESTABLISHED WITH ${user.toUpperCase()}
            </div>
        `;
    }

    function send() {
        if (!currentChat) return alert("Сначала выберите пользователя из списка слева.");
        const input = document.getElementById('main-input');
        if (!input.value.trim()) return;

        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg out';
        msgDiv.innerText = input.value;
        document.getElementById('messages').appendChild(msgDiv);
        input.value = '';
    }
</script>

</body>
</html>
